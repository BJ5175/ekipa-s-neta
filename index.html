<!DOCTYPE html>
<html lang="bs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekipa Sa Net-A | iCarly Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --ic-orange: #fbb03b;
            --ic-purple: #662d91;
            --ic-pink: #ec008c;
            --ic-yellow: #fff200;
            --bg-blue: #00aeef;
            --ic-red: #ff3333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-blue);
            background-image: radial-gradient(rgba(102, 45, 145, 0.2) 2px, transparent 2px);
            background-size: 25px 25px;
            font-family: 'Fredoka One', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 20px 0;
        }

        .logo-container {
            background: white;
            padding: 10px 45px;
            border-radius: 60px;
            border: 6px solid var(--ic-orange);
            transform: rotate(-2deg);
            box-shadow: 10px 10px 0px var(--ic-purple);
        }

        .logo-text {
            font-family: 'Bangers', cursive;
            font-size: 3rem;
            color: var(--ic-purple);
            margin: 0;
            text-transform: uppercase;
        }

        .logo-text span {
            color: var(--ic-pink);
        }

        .container {
            width: 95%;
            max-width: 1200px;
        }

        .main-stage {
            background: white;
            padding: 25px;
            border-radius: 40px;
            border: 10px solid var(--ic-purple);
            box-shadow: 15px 15px 0px rgba(0, 0, 0, 0.15);
            margin-bottom: 25px;
            position: relative;
        }

        .video-main-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border: 8px solid var(--ic-pink);
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mediaContent {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .offline-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .live-status-container {
            text-align: center;
            margin-top: 15px;
        }

        .live-badge {
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 1.5rem;
            display: inline-block;
            border: 4px solid var(--ic-purple);
            box-shadow: 4px 4px 0px var(--ic-orange);
            transition: 0.3s;
            cursor: pointer;
            text-transform: uppercase;
        }

        .badge-offline {
            background: var(--ic-red);
            color: white;
        }

        .badge-online {
            background: var(--ic-yellow);
            color: #222;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            border: 4px solid white;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-purple {
            background: var(--ic-purple);
        }

        .btn-pink {
            background: var(--ic-pink);
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-container">
            <h1 class="logo-text">EKIPA<span>SA</span>NETA</h1>
        </div>
    </header>

    <main class="container">
        <div class="main-stage">
            <div class="video-main-box">
                <div id="mediaContent">
                    <img src="live_offline.png" class="offline-img" alt="Offline">
                </div>
            </div>

            <div class="live-status-container">
                <div class="live-badge badge-offline" id="statusBadge" onclick="goLive()">KLIKNI ZA LIVE</div>
            </div>
        </div>

        <nav class="nav-buttons">
            <div onclick="resetStream()" class="btn btn-purple">OSVJEŽI VIDEO</div>
            <div onclick="goOffline()" class="btn btn-pink">UGASI SVE</div>
        </nav>
    </main>

    <script>
        const mediaContent = document.getElementById('mediaContent');
        const badge = document.getElementById('statusBadge');

        // PAZI: Provjeri da li je soba (EkIpA_S_NeTa_1234) ISTA ona koju koristiš na telefonu/kameri!
        const ninjaBaseURL = "https://vdo.ninja/?view=EkIpA_S_NeTa_1234&autoplay=1&mute=0&chat=1&nomenu=1&transparent=1&bg=000000";

        function goLive() {
            // Dodajemo timestamp da izbjegnemo keširanje browsera
            const finalURL = ninjaBaseURL + "&t=" + Date.now();

            // Ubacujemo iframe sa svim potrebnim dozvolama
            mediaContent.innerHTML = `
                <iframe 
                    id="ninjaIframe"
                    src="${finalURL}" 
                    allow="autoplay; camera; microphone; fullscreen; display-capture; picture-in-picture;" 
                    allowfullscreen>
                </iframe>`;

            badge.innerText = "UŽIVO SMO!";
            badge.className = "live-badge badge-online";
            console.log("Pokušavam pokrenuti live...");
        }

        function resetStream() {
            if (document.getElementById('ninjaIframe')) {
                console.log("Osvježavam video...");
                goLive();
            } else {
                alert("Prvo klikni na crveni 'KLIKNI ZA LIVE' dugme!");
            }
        }

        function goOffline() {
            mediaContent.innerHTML = `<img src="live_offline.png" class="offline-img" alt="Offline">`;
            badge.innerText = "OFFLINE SMO";
            badge.className = "live-badge badge-offline";
            console.log("Sve je ugašeno.");
        }

        // Ove funkcije možeš pozvati i iz konzole
        window.setOnline = goLive;
        window.setOffline = goOffline;
    </script>
</body>

</html>
